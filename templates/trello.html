<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Criar Cartão Trello</title>
    <link rel="stylesheet" href="/style/trello.css">

  </head>
  <body class="login-page">
    <main class="login-shell">
      <header class="login-header" style="display: flex !important; justify-content: space-between !important; align-items: center !important; width: 100% !important; margin-bottom: 20px;">

        <a href="/tela_inicial" class="primary-button" id="back-button" style="text-decoration: none;">
          Voltar
        </a>
        <a class="config" id="config-button" 
        style="display: inline-flex !important; align-items: center !important; justify-content: center !important; width: 36px !important; height: 36px !important; cursor: pointer !important; text-decoration: none !important; margin-right: 20px;">
          <svg xmlns="http://w3.org" viewBox="0 0 24 24" fill="currentColor" style="width: 24px !important; height: 24px !important; display: block !important;">
            <path d="M19.43 12.98c.04-.32.07-.64.07-.98s-.03-.66-.07-.98l2.11-1.65c.19-.15.24-.42.12-.64l-2-3.46c-.12-.22-.39-.3-.61-.22l-2.49 1c-.52-.4-1.08-.73-1.69-.98l-.38-2.65C14.46 2.18 14.25 2 14 2h-4c-.25 0-.46.18-.49.42l-.38 2.65c-.61.25-1.17.59-1.69.98l-2.49-1c-.23-.09-.49 0-.61.22l-2 3.46c-.13.22-.07.49.12.64l2.11 1.65c-.04.32-.07.65-.07.98s.03.66.07.98l-2.11 1.65c-.19.15-.24.42-.12.64l2 3.46c.12.22.39.3.61.22l2.49-1c.52.4 1.08.73 1.69.98l.38 2.65c.03.24.24.42.49.42h4c.25 0 .46-.18.49-.42l-.38-2.65c.61-.25 1.17-.59 1.69-.98l2.49 1c.23.09.49 0 .61-.22l2-3.46c.12-.22.07-.49-.12-.64l-2.11-1.65zM12 15.5c-1.93 0-3-1.07-3-3s1.07-3 3-3s3 1.07 3 3s-1.07 3-3 3z"/>
          </svg>
        </a>
      </header>

      <img src="imagens/logo_agl.png" alt="Logo AGL" class="logo">
      
      <section class="login-card">
        <p class="eyebrow">Integração Trello</p>
        <h1>Criar Cartão no Quadro</h1>
        
        <form id="trelloForm" class="login-form">
          <label>
            <span>Código do Produto</span>
            <div class="search-group">
              <input id="manualCode" name="codigo" type="text" placeholder="Digite o código" autocomplete="off" required>
            </div>
          </label>

          <label>
            <span>Descrição do Produto</span>
            <input style="background-color:white; color: black;" id="manualDescription" type="text" placeholder="Aguardando busca..." readonly disabled>
          </label>

          <label>
            <span>Quantidade</span>
            <input id="manualQuantity" name="quantidade" type="number" min="1" max="500" value="1" required>
          </label>

          <label>
            <span>OP</span>
            <input id="manualOP" name="op" type="text" placeholder="Digite a OP" autocomplete="off" required>
          </label>

          <label>
            <span>Linha / Célula</span>
            <div class="autocomplete-container">
              <input 
                id="trelloLine" 
                type="text" 
                placeholder="Digite ou selecione a célula..." 
                required
                autocomplete="off"
              >
              <ul id="trelloLineDropdown" class="custom-dropdown" style="display: none;"></ul>
            </div>
          </label>
          <div class="container-enviar-trello">
            <button class="primary-button" type="submit" style="width: 85%; height: auto;">Enviar para o Trello</button>
            <label class="prioridade">
              <input class="prioridade-check" id="prioridade" type="checkbox" title="Adiciona o cartão ao topo da lista no Kanban">
              Prioridade
            </label>
          </div>
        </form>

        <p id="statusMessage" class="login-status" role="status"></p>
      </section>
    </main>
    <p></p>
    <footer class=""><a href="https://github.com/oneto133/etiquetas/blob/feature/cartao-trello/CHANGELOG.md">Versão 1.2.4</a></footer>

    <div id="configSidebar" class="sidebar-panel">
      <div class="sidebar-header">
        <h2 class="atualizacao">Configurações</h2>
        <button id="fecharSidebar" class="sidebar-fechar">&times;</button>
      </div>
      <div class="sidebar-conteudo">
        
        <div class="secao-retratil">
          <p class="atualizacao titulo-gatilho" style="margin-bottom: 10px; font-weight: bold; cursor: pointer; display: flex; justify-content: space-between; align-items: center;">
            <span>Atualização de base</span>
            <span class="seta-icone">▼</span>
          </p>
          
          <div class="conteudo-gatilho" style="display: none;">
            <div class="config-grupo">
              <button type="button" class="config-menu-btn">Deslizante</button>
              <div class="config-sub-opcoes">
                <button type="button" class="btn-acao btn-upload" data-tipo="deslizante" data-acao="upload">Upload</button>
                <button type="button" class="btn-acao btn-download" data-tipo="deslizante" data-acao="download">Download</button>
              </div>
            </div>

            <div class="config-grupo">
              <button type="button" class="config-menu-btn">New BV</button>
              <div class="config-sub-opcoes">
                <button type="button" class="btn-acao btn-upload" data-tipo="new_bv" data-acao="upload">Upload</button>
                <button type="button" class="btn-acao btn-download" data-tipo="new_bv" data-acao="download">Download</button>
              </div>
            </div>

            <!-- Grupo Pivotante -->
            <div class="config-grupo">
              <button type="button" class="config-menu-btn">Pivotante</button>
              <div class="config-sub-opcoes">
                <button type="button" class="btn-acao btn-upload" data-tipo="pivotante" data-acao="upload">Upload</button>
                <button type="button" class="btn-acao btn-download" data-tipo="pivotante" data-acao="download">Download</button>
              </div>
            </div>

            <!-- Grupo Basculantes -->
            <div class="config-grupo">
              <button type="button" class="config-menu-btn">Basculantes</button>
              <div class="config-sub-opcoes">
                <button type="button" class="btn-acao btn-upload" data-tipo="basculante" data-acao="upload">Upload</button>
                <button type="button" class="btn-acao btn-download" data-tipo="basculante" data-acao="download">Download</button>
              </div>
            </div>
          </div>
        </div>

        <div class="secao-retratil" style="margin-top: 20px;">
          <p class="atualizacao titulo-gatilho" style="margin-bottom: 10px; font-weight: bold; cursor: pointer; display: flex; justify-content: space-between; align-items: center;">
            <span>Alterar nome da Célula/linha</span>
            <span class="seta-icone">▼</span>
          </p>

          <div class="conteudo-gatilho" style="display: none;">
            <div class="config-grupo">
              <button type="button" class="config-menu-btn" id="btnMenuLinhas">Linhas</button>
              <div class="config-sub-opcoes" id="containerListaLinhas" style="display: none; flex-direction: column; gap: 10px; padding: 10px 0;">
              </div>
            </div>
          </div>
        </div>

      </div>
    </div>

    <script src="/style/trello.js"></script>
  </body>
</html>
