<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Acesso - Impressão de Etiquetas</title>
    <link rel="stylesheet" href="/style/styles.css">
  </head>
  <body class="login-page">
    <main class="login-shell">
      <img src="imagens/logo_agl.png" alt="Logo AGL" class="logo">
      <section class="login-card">
        
        <p class="eyebrow">Acesso</p>
        <h1>AGL Flow</h1>
        
        <form id="loginForm" class="login-form">
          <label>
            <span>Usuário</span>
            <input id="loginUser" type="text" value="admin" autocomplete="username" required>
          </label>
          <label>
            <span>Senha</span>
            <input id="loginPassword" type="password" value="123456" autocomplete="current-password" required>
          </label>

          <label>
            <span>Setor</span>
            <input id="loginDepartment" type="text" value="Motores" autocomplete="organization" required>
          </label>
          <button class="primary-button" type="submit">Entrar</button>
        </form>

        <p id="loginStatus" class="login-status" role="status"></p>


      </section>
    </main>
    <footer class=""><a href="https://github.com/oneto133/etiquetas/blob/feature/cartao-trello/CHANGELOG.md">Versão 1.2.3</a></footer>
    <script src="/style/login.js"></script>
  </body>
</html>
